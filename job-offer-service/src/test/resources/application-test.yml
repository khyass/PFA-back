server:
  port: 0

spring:
  application:
    name: job-offer-service-test

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/test

# Logging
logging:
  level:
    com.example.jobofferservice: DEBUG
    org.springframework.security: DEBUG
