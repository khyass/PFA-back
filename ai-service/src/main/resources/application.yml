server:
  port: 8086
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: ai-service

  datasource:
    url: jdbc:h2:file:./data/aiservice;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=true
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/job-platform}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/job-platform/protocol/openid-connect/certs}

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

# Ollama Configuration (Free local LLM)
app:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    timeout-seconds: 120
  ai:
    min-match-score: 30
    max-suggestions: 10
    resume-max-chars: 3000
  job-offer-service:
    url: ${JOB_OFFER_SERVICE_URL:http://localhost:8084}
  candidate-service:
    url: ${CANDIDATE_SERVICE_URL:http://localhost:8085}

# Async thread pool configuration
async:
  core-pool-size: 5
  max-pool-size: 10
  queue-capacity: 25

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  security:
    enabled: false
  tracing:
    sampling:
      probability: 1.0

# Logging
logging:
  level:
    com.example.aiservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{userId:-}]"
