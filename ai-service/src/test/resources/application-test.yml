# Test configuration for ai-service
spring:
  application:
    name: ai-service-test
  
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:16-alpine:///aiservice
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      resourceserver:
        jwt:
          # Will be overridden by WireMock in tests
          jwk-set-uri: http://localhost:${wiremock.server.port}/realms/job-tracker/protocol/openid-connect/certs
          issuer-uri: http://localhost:${wiremock.server.port}/realms/job-tracker

# App configuration for tests
app:
  ollama:
    # WireMock will mock Ollama
    base-url: http://localhost:${wiremock.server.port}
    model: llama3.2
    timeout-seconds: 10
  
  job-offer-service:
    url: http://localhost:${wiremock.server.port}
  
  ai:
    min-match-score: 30
    max-suggestions: 10
    resume-max-chars: 3000

async:
  core-pool-size: 2
  max-pool-size: 4
  queue-capacity: 10

logging:
  level:
    com.example.aiservice: DEBUG
    org.springframework.security: DEBUG
    org.wiremock: DEBUG
