server:
  port: 8085
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: candidate-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5435/candidates}
    username: ${DATABASE_USERNAME:candidates}
    password: ${DATABASE_PASSWORD:candidates}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/job-platform}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/job-platform/protocol/openid-connect/certs}

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

# Application-specific configuration
app:
  upload:
    path: ${UPLOAD_PATH:./uploads}
  job-offer-service:
    url: ${JOB_OFFER_SERVICE_URL:http://localhost:8084}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0

# Logging
logging:
  level:
    com.example.candidateservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{userId:-}]"
